# Squid configuration: default-deny egress with an explicit domain allowlist.
# Used as a sidecar to constrain Claude Code's outbound network access.

http_port 3128
pid_filename none

# Allowlist of destination domains. Leading "." matches subdomains.
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Allow CONNECT only to standard TLS ports.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Interactive approval for anything not statically allowlisted. Squid invokes the
# helper (one process per outstanding request, up to children-max) which blocks on
# the approver sidecar until a human approves/denies. ttl=0 = decide every request
# (no caching of verdicts in v1); fail-closed if the helper errors or times out.
#
# %>h{Proxy-Authorization} hands the helper the raw (percent-encoded) Proxy-Auth
# header so the approver can attribute the request to a Claude session: the launcher
# embeds a per-session token as the Basic-auth username in the proxy URL. Passing the
# header — rather than using %un — deliberately avoids forcing proxy_auth, which would
# 407 any uncredentialed request before the helper runs. Untagged requests arrive with
# this field as "-" and are handled exactly as before (anonymous). Attribution only,
# never a trust boundary: any process here can forge any token.
external_acl_type approver ttl=0 negative_ttl=0 \
    children-startup=1 children-max=8 \
    %URI %METHOD %>h{Proxy-Authorization} /usr/local/bin/approve_helper.sh
acl needs_approval external approver

# Allowlisted domains are fast-pathed; everything else falls through to approval.
http_access allow allowed_domains
http_access allow needs_approval
http_access deny all

# Don't reveal Squid's presence via Via / X-Forwarded-For.
via off
forwarded_for delete

# Minimal logging to stdout (the container will surface it).
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# No on-disk cache; this is a filter, not a CDN.
cache deny all
