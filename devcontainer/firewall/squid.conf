# Squid configuration: default-deny egress with an explicit domain allowlist.
# Used as a sidecar to constrain Claude Code's outbound network access.

http_port 3128

# Allowlist of destination domains. Leading "." matches subdomains.
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Allow CONNECT only to standard TLS ports.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow traffic only to the allowlisted domains.
http_access allow allowed_domains
http_access deny all

# Don't reveal Squid's presence via Via / X-Forwarded-For.
via off
forwarded_for delete

# Minimal logging to stdout (the container will surface it).
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# No on-disk cache; this is a filter, not a CDN.
cache deny all
