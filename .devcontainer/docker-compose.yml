services:
  # Egress approval broker. Squid's external_acl helper submits non-allowlisted
  # requests here and blocks; a human approves/denies via the token-gated
  # /decision endpoint (host-side only — the token is never in the app container).
  approver:
    container_name: __name__-approver
    build:
      context: approver
      dockerfile: Dockerfile
    environment:
      # OPTIONAL override. Left empty by default: the approver mints a fresh random
      # token per start and writes it to the tmpfs below, so the secret never lands
      # in a host file the app container bind-mounts (..:/workspace) and can read.
      # The host retrieves it out-of-band via:
      #   docker compose exec approver cat /run/approver/token
      # Set this (via .devcontainer/.env) only to pin a token for testing — doing so
      # reintroduces that file as a readable surface, so prefer the generated path.
      # Network segmentation (below) is the primary control keeping the app container
      # away from the approver; the token is defense-in-depth on the one unavoidable
      # surface — the host-published /decision port.
      APPROVER_TOKEN: ${APPROVER_TOKEN:-}
    # In-RAM mount for the generated token. Wiped on container stop; never on disk.
    tmpfs:
      - /run/approver
    # Published to the host loopback so the host-side decider (Phase 2 VS Code
    # extension; Phase 1 host curl) can reach the decision endpoint. The approver
    # sits on `external` ONLY — deliberately NOT on proxy_net — so the sandboxed
    # app container has no network route to it whatsoever (can't submit spurious
    # prompts, can't read /pending, can't hit /decision). The firewall's helper
    # reaches it over `external`; the host reaches it via the published port.
    # (Port publishing requires a non-internal bridge, so `external` is also why
    # the approver has outbound internet — acceptable: it never initiates egress.)
    ports:
      - "127.0.0.1:3129:3129"
    networks:
      - external
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3129/health"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  firewall:
    container_name: __name__-firewall
    build:
      context: firewall
      dockerfile: Dockerfile
    volumes:
      - ./firewall/allowed_domains.txt:/etc/squid/allowed_domains.txt:ro
      - ./firewall/denied_domains.txt:/etc/squid/denied_domains.txt:ro
    # `external` = real internet egress + the path to the approver; `proxy_net` =
    # the internal-only segment shared with the app container (which reaches Squid
    # here but, having no other network, can reach nothing else directly).
    networks:
      - external
      - proxy_net
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      approver:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/3128"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  devcontainer:
    container_name: __name__-devcontainer
    build:
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
      # Re-mount the firewall config read-only, overlaying the read-write
      # /workspace mount above. The egress allowlist is a host-controlled trust
      # boundary: a process inside this (sandboxed) container must not be able to
      # widen its own network access by editing allowed_domains.txt. Edit it from
      # the host instead — the firewall sidecar reads the same host file and
      # live-reloads on change.
      - ./firewall:/workspace/.devcontainer/firewall:ro
      # Mount host's global Claude config and the devenv repo so that
      # ~/.claude/* relative symlinks (created by devenv's scripts/install.sh)
      # resolve inside the container, and edits to claude files propagate
      # live in both directions. Adjust /root if the container user is not root.
      - ${HOME}/.claude:/home/ka-jo/.claude
      - ${HOME}/devenv:/home/ka-jo/devenv
      - ./managed-settings.json:/etc/claude-code/managed-settings.json:ro
      - pnpm-store:/home/ka-jo/.pnpm-store
    working_dir: /workspace
    environment:
      HTTP_PROXY: http://firewall:3128
      HTTPS_PROXY: http://firewall:3128
      http_proxy: http://firewall:3128
      https_proxy: http://firewall:3128
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
      # Make Node's built-in http/https modules respect proxy env vars (Node 22+).
      # (see: https://nodejs.org/learn/http/enterprise-network-configuration)
      NODE_USE_ENV_PROXY: "1"
      # Pin the pnpm store to the shared volume mount point regardless of
      # which user the container process runs as. (see: https://github.com/orgs/pnpm/discussions/9460)
      pnpm_config_store_dir: /home/ka-jo/.pnpm-store
    # On proxy_net ONLY: the app container's sole network reach is Squid. It has no
    # route to the approver (decision authority) or the internet except through it.
    networks:
      - proxy_net
    depends_on:
      firewall:
        condition: service_healthy

volumes:
  pnpm-store:
    external: true
    name: shared-pnpm-store

networks:
  external:
    driver: bridge
  # Internal-only segment between the app container and Squid. `internal: true`
  # means no direct outbound; the app container's only escape is via the proxy.
  proxy_net:
    driver: bridge
    internal: true
